version: 2.1
orbs:
  node: circleci/node@5.0.2
  eb: circleci/aws-elastic-beanstalk@2.0.1
  aws-cli: circleci/aws-cli@3.1.1

jobs:
  build:
    docker:
      - image: "cimg/node:14.15"
    steps:
      - node/install:
          node-version: '14.15'         
      - checkout
      - run:
          name: Fix EB Config Path for Build
          command: |
            mkdir -p udagram/udagram-api/.elasticbeanstalk
            cat \<<EOF > udagram/udagram-api/.elasticbeanstalk/config.yml
            branch-defaults:
              master:
                environment: Udagram-final-project-env
            global:
              application_name: udagram-final-project
              default_platform: node.js
              default_region: us-east-1
              profile: null
              sc: git
            EOF
      - run:
          name: Install Front-End Dependencies
          command: |
            npm run frontend:install
      - run:
          name: Install API Dependencies
          command: |
            npm run api:install           
      - run:
          name: Front-End Lint
          command: |
            npm run frontend:lint         
      - run:
          name: Front-End Build
          command: |
            npm run frontend:build
      - run:
          name: API Build
          command: |
            npm run api:build

  deploy:
    docker:
      - image: "cimg/base:stable"
    steps:
      - node/install:
          node-version: '14.15' 
      - eb/setup
      - aws-cli/setup
      - checkout
      - run:
          name: Create EB Config for Deploy
          command: |
            mkdir -p udagram/udagram-api/.elasticbeanstalk
            cat \<<EOF > udagram/udagram-api/.elasticbeanstalk/config.yml
            branch-defaults:
              master:
                environment: Udagram-final-project-env
            global:
              application_name: udagram-final-project
              default_platform: node.js
              default_region: us-east-1
              profile: null
              sc: git
            EOF
      - run:
          name: Deploy App
          command: |
            npm run frontend:install
            npm run api:install            
            npm run frontend:build
            npm run api:build            
            npm run frontend:deploy
            npm run api:deploy
            
workflows:
  udagram:
    jobs:
      - build
      - hold:
          filters:
            branches:
              only:
                - master
          type: approval
          requires:
            - build
      - deploy:
          requires:
            - hold